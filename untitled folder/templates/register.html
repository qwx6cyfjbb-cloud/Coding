<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/static/css/style.css"></head>
<body>
    <div class="container">
        <div class="login-wrapper">
        <h2 style="text-align: center; color: #bb86fc;">Create Account</h2>
        {% with messages = get_flashed_messages() %}{% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}{% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <button type="submit">Register</button>
        </form>
        <p style="text-align: center;">Already have an account? <a href="/login">Login</a></p>
    </div>
    </div>
</body>
</html>
